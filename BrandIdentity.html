document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +
              'var n = p[j], tn = n && n.tagName;' +
              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 {\n  font-family: 'Syne';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"47554c30-f912-48c5-a34e-178c83398ecc\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Syne';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"596acd38-32f2-4f25-9e62-9de2237a8cc4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    * { margin: 0; padding: 0; box-sizing: border-box; }\n    body { font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif; background: #f8f9fb; color: #1a1a1a; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"min-height: 100vh; padding: 40px 20px; background: #f8f9fb;\">\n  <div style=\"max-width: 1400px; margin: 0 auto;\">\n    \n    <!-- Header -->\n    <div style=\"margin-bottom: 60px;\">\n      <h1 style=\"font-size: 48px; font-weight: 700; color: #0f172a; margin-bottom: 12px;\">CapTable Brand Identity<\u002Fh1>\n      <p style=\"font-size: 18px; color: #64748b; font-weight: 400;\">Cool, professional, minimal &amp; refined for founders<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Color System -->\n    <section style=\"margin-bottom: 80px;\">\n      <h2 style=\"font-size: 32px; font-weight: 700; color: #0f172a; margin-bottom: 32px;\">Color System<\u002Fh2>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px;\">\n        <div>\n          <div style=\"width: 100%; height: 120px; background: #0066cc; border-radius: 8px; margin-bottom: 12px;\"><\u002Fdiv>\n          <p style=\"font-size: 14px; font-weight: 600; color: #0f172a;\">Primary Blue<\u002Fp>\n          <p style=\"font-size: 13px; color: #64748b;\">#0066CC<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"width: 100%; height: 120px; background: #f59e0b; border-radius: 8px; margin-bottom: 12px;\"><\u002Fdiv>\n          <p style=\"font-size: 14px; font-weight: 600; color: #0f172a;\">Warm Amber/Gold<\u002Fp>\n          <p style=\"font-size: 13px; color: #64748b;\">#F59E0B<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"width: 100%; height: 120px; background: #1e293b; border-radius: 8px; margin-bottom: 12px;\"><\u002Fdiv>\n          <p style=\"font-size: 14px; font-weight: 600; color: #0f172a;\">Slate<\u002Fp>\n          <p style=\"font-size: 13px; color: #64748b;\">#1E293B<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"width: 100%; height: 120px; background: #f0f4f8; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 12px;\"><\u002Fdiv>\n          <p style=\"font-size: 14px; font-weight: 600; color: #0f172a;\">Light Gray<\u002Fp>\n          <p style=\"font-size: 13px; color: #64748b;\">#F0F4F8<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Logo: Picon -->\n    <section style=\"margin-bottom: 80px;\">\n      <h2 style=\"font-size: 32px; font-weight: 700; color: #0f172a; margin-bottom: 32px;\">Primary Logo: The Picon<\u002Fh2>\n      <div style=\"background: white; padding: 48px; border-radius: 12px; border: 1px solid #e2e8f0;\">\n        <div style=\"display: flex; justify-content: center; align-items: center; margin-bottom: 32px;\">\n          <img src=\"7c21f481-beaf-4f81-9a1e-3d9918c1fdd5\" alt=\"CapTable Picon\" style=\"height: 220px; width: auto;\">\n        <\u002Fdiv>\n        <div style=\"text-align: center;\">\n          <p style=\"font-family: 'Outfit', sans-serif; font-size: 36px; font-weight: 700; color: #0f172a; margin-bottom: 12px;\">CapTable<\u002Fp>\n          <p style=\"font-size: 14px; color: #64748b;\">A clean, rotating pie chart forming the letter \"C\"—representing founders (blue), investors (amber), and employees (slate)<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      \n      <!-- Logo Backgrounds -->\n      <div style=\"margin-top: 48px; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 32px;\">\n        <div style=\"text-align: center;\">\n          <div style=\"background: #0f172a; padding: 40px; border-radius: 8px; display: flex; justify-content: center; align-items: center; height: 180px; margin-bottom: 16px;\">\n            <img src=\"cb334a1f-f99a-4623-b02e-cea5e0519e3c\" alt=\"CapTable Picon\" style=\"height: 120px; width: auto;\">\n          <\u002Fdiv>\n          <p style=\"font-size: 12px; font-weight: 600; color: #0f172a;\">Dark Background<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"text-align: center;\">\n          <div style=\"background: white; padding: 40px; border-radius: 8px; border: 1px solid #e2e8f0; display: flex; justify-content: center; align-items: center; height: 180px; margin-bottom: 16px;\">\n            <img src=\"7c21f481-beaf-4f81-9a1e-3d9918c1fdd5\" alt=\"CapTable Picon\" style=\"height: 120px; width: auto;\">\n          <\u002Fdiv>\n          <p style=\"font-size: 12px; font-weight: 600; color: #0f172a;\">Light Background<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"text-align: center;\">\n          <div style=\"background: #f0f4f8; padding: 40px; border-radius: 8px; display: flex; justify-content: center; align-items: center; height: 180px; margin-bottom: 16px;\">\n            <img src=\"7c21f481-beaf-4f81-9a1e-3d9918c1fdd5\" alt=\"CapTable Picon\" style=\"height: 120px; width: auto;\">\n          <\u002Fdiv>\n          <p style=\"font-size: 12px; font-weight: 600; color: #0f172a;\">Brand Gray<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Typography -->\n    <section style=\"margin-bottom: 80px;\">\n      <h2 style=\"font-size: 32px; font-weight: 700; color: #0f172a; margin-bottom: 32px;\">Primary Typeface<\u002Fh2>\n      <div style=\"background: white; padding: 32px; border-radius: 12px; border: 1px solid #e2e8f0; max-width: 600px;\">\n        <p style=\"font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 700; color: #0066cc; margin-bottom: 16px;\">CapTable<\u002Fp>\n        <p style=\"font-family: 'Outfit', sans-serif; font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 20px;\">Friendly geometric precision. Outfit feels modern, approachable, and slightly playful—perfect for a founder-first tool. Works beautifully for headlines and body text.<\u002Fp>\n        <div style=\"background: #f8f9fb; padding: 16px; border-radius: 8px; border-left: 4px solid #0066cc;\">\n          <p style=\"font-family: 'Outfit', sans-serif; font-size: 12px; color: #1a1a1a; margin-bottom: 8px;\"><strong>Headlines:<\u002Fstrong> Outfit 700–800<\u002Fp>\n          <p style=\"font-family: 'Outfit', sans-serif; font-size: 12px; color: #1a1a1a;\"><strong>Body:<\u002Fstrong> Outfit 400–600<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Brand Applications -->\n    <section style=\"margin-bottom: 80px;\">\n      <h2 style=\"font-size: 32px; font-weight: 700; color: #0f172a; margin-bottom: 32px;\">Brand Applications<\u002Fh2>\n      \n      <!-- App Header Example -->\n      <div style=\"background: white; padding: 32px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 32px;\">\n        <p style=\"font-size: 14px; font-weight: 600; color: #64748b; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px;\">Dashboard Header<\u002Fp>\n        <div style=\"background: #0f172a; padding: 20px 32px; border-radius: 8px; display: flex; align-items: center; gap: 16px;\">\n          <img src=\"cb334a1f-f99a-4623-b02e-cea5e0519e3c\" alt=\"CapTable Picon\" style=\"height: 32px; width: auto;\">\n          <div style=\"color: white;\">\n            <p style=\"font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 700;\">CapTable<\u002Fp>\n            <p style=\"font-size: 13px; color: #cbd5e1;\">Manage equity &amp; ownership<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Card Example -->\n      <div style=\"background: white; padding: 32px; border-radius: 12px; border: 1px solid #e2e8f0;\">\n        <p style=\"font-size: 14px; font-weight: 600; color: #64748b; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px;\">Information Card<\u002Fp>\n        <div style=\"background: linear-gradient(135deg, #f0f4f8 0%, #e0e7f1 100%); padding: 24px; border-radius: 8px; border-left: 4px solid #0066cc;\">\n          <p style=\"font-family: 'Outfit', sans-serif; font-size: 13px; color: #64748b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;\">YOUR OWNERSHIP<\u002Fp>\n          <p style=\"font-family: 'Outfit', sans-serif; font-size: 32px; font-weight: 700; color: #0066cc; margin-bottom: 16px;\">4.25%<\u002Fp>\n          <div style=\"display: flex; gap: 20px; font-size: 13px; color: #475569;\">\n            <div><strong style=\"color: #0f172a;\">125,000<\u002Fstrong> shares<\u002Fdiv>\n            <div><strong style=\"color: #0f172a;\">2.5M<\u002Fstrong> total outstanding<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Design Rationale -->\n    <section>\n      <h2 style=\"font-size: 32px; font-weight: 700; color: #0f172a; margin-bottom: 24px;\">Design Rationale<\u002Fh2>\n      <div style=\"background: white; padding: 32px; border-radius: 12px; border: 1px solid #e2e8f0;\">\n        <div style=\"display: grid; gap: 20px;\">\n          <div>\n            <p style=\"font-size: 14px; font-weight: 600; color: #0066cc; margin-bottom: 8px;\">🎯 \"C\" Pie Chart Icon<\u002Fp>\n            <p style=\"font-size: 14px; color: #475569; line-height: 1.6;\">The pie chart rotated ~90° forms a natural \"C\" shape, merging the symbol for ownership with the brand's initial. Three colors (blue, amber, slate) show equity distribution and multi-stakeholder dynamics instantly.<\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <p style=\"font-size: 14px; font-weight: 600; color: #f59e0b; margin-bottom: 8px;\">🌊 Color Palette<\u002Fp>\n            <p style=\"font-size: 14px; color: #475569; line-height: 1.6;\">Cool blue (#0066CC) conveys trust and stability. Warm amber/gold (#F59E0B) adds energy and optimism—founders building the future. Slate (#1E293B) grounds everything in professionalism. On dark backgrounds, use light gray (#F0F4F8) for contrast. Together: premium, energetic, trustworthy.<\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <p style=\"font-size: 14px; font-weight: 600; color: #0066cc; margin-bottom: 8px;\">📝 Typography — Outfit<\u002Fp>\n            <p style=\"font-size: 14px; color: #475569; line-height: 1.6;\">Modern geometric sans-serif with friendly warmth. Outfit feels contemporary and approachable—perfect for a founder-first SaaS. Works across headlines, body copy, and UI with consistent geometric forms.<\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <p style=\"font-size: 14px; font-weight: 600; color: #0f172a; margin-bottom: 8px;\">✨ Tone<\u002Fp>\n            <p style=\"font-size: 14px; color: #475569; line-height: 1.6;\">CapTable speaks with clarity and confidence. No jargon, no hype. The brand is a competent, forward-thinking partner helping founders navigate equity complexity with ease.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {};\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"CapTable Brand Identity.dc"}
